# .github/workflows/pr-handler.yml
on:
  pull_request:
    types: [opened, closed]   # capture both open and close events

jobs:
  handle-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Send PR Event to Lambda
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          PAYLOAD=$(jq -n \
            --arg event_action "${{ github.event.action }}" \
            --arg pr_number "${{ github.event.pull_request.number }}" \
            --arg pr_title "${{ github.event.pull_request.title }}" \
            --arg author "${{ github.event.pull_request.user.login }}" \
            --arg source_branch "${{ github.head_ref }}" \
            --arg target_branch "${{ github.base_ref }}" \
            --arg commit_sha "${{ github.event.pull_request.head.sha }}" \
            --arg merged "${{ github.event.pull_request.merged }}" \
            --arg merged_by "${{ github.event.pull_request.merged_by.login }}" \
            --arg repo "${{ github.repository }}" \
            --arg platform "github" \
            '{
              event_action: $event_action,
              platform: $platform,
              pr_number: $pr_number,
              pr_title: $pr_title,
              author: $author,
              source_branch: $source_branch,
              target_branch: $target_branch,
              commit_sha: $commit_sha,
              merged: $merged,
              merged_by: $merged_by,
              repo: $repo
            }')

          aws lambda invoke \
            --function-name post-pr-actions-trigger \
            --payload $(echo $PAYLOAD | base64 -w 0) \
            --cli-binary-format raw-in-base64-out \
            response.json
